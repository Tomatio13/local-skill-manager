name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: local-skill-manager_linux_amd64
            archive_name: local-skill-manager_linux_amd64.zip
          - goos: linux
            goarch: arm64
            artifact_name: local-skill-manager_linux_arm64
            archive_name: local-skill-manager_linux_arm64.zip
          - goos: darwin
            goarch: amd64
            artifact_name: local-skill-manager_darwin_amd64
            archive_name: local-skill-manager_darwin_amd64.zip
          - goos: darwin
            goarch: arm64
            artifact_name: local-skill-manager_darwin_arm64
            archive_name: local-skill-manager_darwin_arm64.zip
          - goos: windows
            goarch: amd64
            artifact_name: local-skill-manager_windows_amd64.exe
            archive_name: local-skill-manager_windows_amd64.zip
          - goos: windows
            goarch: arm64
            artifact_name: local-skill-manager_windows_arm64.exe
            archive_name: local-skill-manager_windows_arm64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -buildvcs=false -o dist/${{ matrix.artifact_name }} ./cmd/local-skill-manager
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Package zip
        run: |
          cd dist
          zip -q ${{ matrix.archive_name }} ${{ matrix.artifact_name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive_name }}
